name: Linux Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: pixvitta-linux-release
  cancel-in-progress: false

jobs:
  linux:
    name: Build and publish Linux packages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Linux packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes imagemagick

      - name: Read release version
        id: version
        run: |
          version="$(node -p "require('./package.json').version")"
          node -e 'if (!/^\d+\.\d+\.\d+$/.test(process.argv[1])) throw new Error(`main requires a stable semantic version, received ${process.argv[1]}`)' "$version"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Verify release does not exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if gh release view "v${VERSION}" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release v${VERSION} already exists. Bump package.json before pushing to main."
            exit 1
          fi

      - name: Validate
        run: pnpm validate

      - name: Build Linux packages
        run: pnpm dist:linux

      - name: Verify release assets
        run: |
          test -f release/Pixvitta.AppImage
          test -f "release/Pixvitta-${{ steps.version.outputs.version }}-amd64.deb"
          test -f release/latest-linux.yml
          grep -F "version: ${{ steps.version.outputs.version }}" release/latest-linux.yml
          grep -F "url: Pixvitta.AppImage" release/latest-linux.yml
          grep -F "url: Pixvitta-${{ steps.version.outputs.version }}-amd64.deb" release/latest-linux.yml
          node scripts/verify-linux-package.mjs stable "release/Pixvitta-${{ steps.version.outputs.version }}-amd64.deb"

      - name: Publish stable release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          gh release create "v${VERSION}" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "Pixvitta ${VERSION}" \
            --generate-notes \
            --latest \
            release/Pixvitta.AppImage \
            "release/Pixvitta-${VERSION}-amd64.deb" \
            release/latest-linux.yml
