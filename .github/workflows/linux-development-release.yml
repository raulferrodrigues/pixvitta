name: Linux Development Release

on:
  push:
    branches:
      - dev

permissions:
  contents: write

concurrency:
  group: pixvitta-linux-development-release
  cancel-in-progress: true

jobs:
  linux:
    name: Build and publish Linux packages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Linux packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes imagemagick

      - name: Set development version
        id: version
        run: |
          version="$(node scripts/development-version.mjs "$GITHUB_RUN_NUMBER" "$GITHUB_RUN_ATTEMPT")"
          pnpm version "$version" --no-git-tag-version
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Validate
        run: pnpm validate

      - name: Build Linux packages
        run: pnpm dist:linux:dev

      - name: Verify update assets
        run: |
          test -f release/Pixvitta-Dev.AppImage
          test -f "release/Pixvitta-Dev-${{ steps.version.outputs.version }}-amd64.deb"
          test -f release/dev-linux.yml
          grep -F "version: ${{ steps.version.outputs.version }}" release/dev-linux.yml
          grep -F "url: Pixvitta-Dev.AppImage" release/dev-linux.yml
          grep -F "url: Pixvitta-Dev-${{ steps.version.outputs.version }}-amd64.deb" release/dev-linux.yml
          node scripts/verify-linux-package.mjs dev "release/Pixvitta-Dev-${{ steps.version.outputs.version }}-amd64.deb"

      - name: Publish development release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          gh release create "v${VERSION}" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "Pixvitta Dev ${VERSION}" \
            --notes "Automated Pixvitta Dev Linux build from ${GITHUB_SHA}. It installs alongside stable Pixvitta." \
            --prerelease \
            release/Pixvitta-Dev.AppImage \
            "release/Pixvitta-Dev-${VERSION}-amd64.deb" \
            release/dev-linux.yml
